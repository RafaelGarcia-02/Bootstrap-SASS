<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="css/custom.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <title>FestivAll - Plataforma de Eventos</title>
</head>
<body style="background-color: #0b0b12; color: #ffffff; min-height: 100vh;" class="d-flex flex-column">

    <div id="navbar-placeholder"></div>

    <main class="container-fluid px-4 py-5 flex-grow-1">
        <h2 class="fw-bold mb-4 text-center text-md-start px-2">Todos los Festivales</h2>
        
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-5 g-3" id="contenedor-festivales">
            </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        // Cargar Navbar y Footer
        cargarComponente('navbar-placeholder', 'navbar.html');
        cargarComponente('footer-placeholder', 'footer.html');

        // Bucle de clonación de tarjetas requerido
        const numeroDeTarjetas = 15; 
        const contenedor = document.getElementById('contenedor-festivales');

        fetch('card.html')
          .then(response => response.text())
          .then(htmlTarjeta => {
            let estructuraCompleta = '';
            for (let i = 0; i < numeroDeTarjetas; i++) {
              estructuraCompleta += htmlTarjeta;
            }
            // Corregido el error de tipografía
            contenedor.innerHTML = estructuraCompleta;
          })
          .catch(error => console.error('Error al clonar la tarjeta:', error));
      });

      function cargarComponente(idContenedor, rutaArchivo) {
          fetch(rutaArchivo)
              .then(response => response.text())
              .then(data => {
                  document.getElementById(idContenedor).innerHTML = data;
              })
              .catch(error => console.error('Error cargando el componente:', error));
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
